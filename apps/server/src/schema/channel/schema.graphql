extend type Query {
  channels: [Channel!]!
  channel(id: ID!): Channel
}

extend type Mutation {
  createChannel(name: String!, serverId: String, type: String, workspacesEnabled: Boolean, teamIds: [String!], githubUrl: String, baseBranch: String, defaultSetupScript: String, defaultRunScript: String, defaultTeardownScript: String): Channel!
  updateChannel(id: ID!, name: String, workspacesEnabled: Boolean, teamIds: [String!], baseBranch: String, githubUrl: String, defaultRepoPath: String, defaultSetupScript: String, defaultRunScript: String, defaultTeardownScript: String): Channel!
  deleteChannel(id: ID!): Boolean!
  joinChannel(channelId: ID!): Boolean!
}

extend type Subscription {
  channelChangedInServer(serverId: ID!): ChannelChangeEvent!
}

type ChannelChangeEvent {
  channelId: String!
  action: String!
}

type Channel {
  id: ID!
  serverId: String!
  name: String!
  type: String!
  workspacesEnabled: Boolean!
  teamIds: [String!]!
  baseBranch: String
  githubUrl: String
  defaultRepoPath: String
  defaultSetupScript: String
  defaultRunScript: String
  defaultTeardownScript: String
  createdAt: DateTime!
  updatedAt: DateTime!
}
