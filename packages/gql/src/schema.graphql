scalar DateTime
scalar JSON

enum SessionStatus {
  creating
  pending
  active
  paused
  needs_input
  completed
  failed
  unreachable
  in_review
  merged
}

enum TicketStatus {
  backlog
  todo
  in_progress
  in_review
  done
  cancelled
}

enum Priority {
  urgent
  high
  medium
  low
}

enum HostingMode {
  cloud
  local
}

enum SessionConnectionState {
  connected
  degraded
  disconnected
}

enum DeliveryResult {
  delivered
  no_runtime
  runtime_disconnected
  session_unbound
  delivery_failed
}

enum CodingTool {
  claude_code
  codex
  custom
}

enum ChannelType {
  default
  announcement
  triage
  feed
}

enum ChatType {
  dm
  group
}

enum ScopeType {
  channel
  chat
  session
  ticket
  system
}

enum ActorType {
  user
  agent
  system
}

enum EntityType {
  session
  ticket
  channel
  chat
}

enum UserRole {
  admin
  member
  observer
}

enum AgentTrustLevel {
  autonomous
  suggest
  blocked
}

enum InboxItemType {
  plan
  question
}

enum InboxItemStatus {
  active
  resolved
  dismissed
}

enum ApiTokenProvider {
  anthropic
  openai
  github
  ssh_key
}

enum EventType {
  message_sent
  message_edited
  message_deleted
  session_started
  session_paused
  session_resumed
  session_terminated
  session_deleted
  session_output
  ticket_created
  ticket_updated
  ticket_commented
  entity_linked
  repo_created
  repo_updated
  channel_created
  member_joined
  member_left
  inbox_item_created
  inbox_item_resolved
  session_pr_opened
  session_pr_merged
  chat_created
  chat_member_added
  chat_member_removed
  chat_renamed
}

# --- Core Types ---

type Organization {
  id: ID!
  name: String!
  members: [User!]!
  repos: [Repo!]!
  projects: [Project!]!
  channels: [Channel!]!
}

type User {
  id: ID!
  email: String!
  name: String!
  avatarUrl: String
  role: UserRole!
}

type Repo {
  id: ID!
  name: String!
  remoteUrl: String!
  defaultBranch: String!
  webhookActive: Boolean!
  projects: [Project!]!
  sessions: [Session!]!
}

type Project {
  id: ID!
  name: String!
  repo: Repo
  channels: [Channel!]!
  sessions: [Session!]!
  tickets: [Ticket!]!
}

type Channel {
  id: ID!
  name: String!
  type: ChannelType!
  members: [User!]!
  projects: [Project!]!
  messages(after: DateTime, limit: Int): [Event!]!
}

type Session {
  id: ID!
  name: String!
  status: SessionStatus!
  tool: CodingTool!
  model: String
  hosting: HostingMode!
  createdBy: User!
  repo: Repo
  branch: String
  workdir: String
  toolSessionId: String
  channel: Channel
  parentSession: Session
  childSessions: [Session!]!
  projects: [Project!]!
  tickets: [Ticket!]!
  endpoints: SessionEndpoints
  connection: SessionConnection
  prUrl: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Ticket {
  id: ID!
  title: String!
  description: String!
  status: TicketStatus!
  priority: Priority!
  assignees: [User!]!
  labels: [String!]!
  origin: Event
  channel: Channel
  projects: [Project!]!
  sessions: [Session!]!
}

type Event {
  id: ID!
  scopeType: ScopeType!
  scopeId: ID!
  eventType: EventType!
  payload: JSON!
  actor: Actor!
  parentId: ID
  timestamp: DateTime!
  metadata: JSON
}

type InboxItem {
  id: ID!
  itemType: InboxItemType!
  status: InboxItemStatus!
  title: String!
  summary: String
  payload: JSON!
  userId: ID!
  sourceType: String!
  sourceId: ID!
  createdAt: DateTime!
  resolvedAt: DateTime
}

type Chat {
  id: ID!
  type: ChatType!
  name: String
  members: [ChatMember!]!
  messages(after: DateTime, before: DateTime, limit: Int): [Event!]!
  createdBy: User!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type ChatMember {
  user: User!
  joinedAt: DateTime!
}

type Participant {
  userId: ID!
  user: User!
  scopeType: String!
  scopeId: ID!
  subscribedAt: DateTime!
  muted: Boolean!
}

type ThreadSummary {
  rootEventId: ID!
  replyCount: Int!
  lastReplyAt: DateTime
  participantIds: [ID!]!
}

# --- Supporting Types ---

type Actor {
  type: ActorType!
  id: ID!
  name: String
  avatarUrl: String
}

type TerminalEndpoint {
  id: String!
  wsUrl: String!
  status: String!
}

type PortEndpoint {
  port: Int!
  url: String!
  label: String!
  status: String!
}

type SessionEndpoints {
  terminals: [TerminalEndpoint!]!
  ports: [PortEndpoint!]!
}

type SessionConnection {
  state: SessionConnectionState!
  runtimeInstanceId: String
  runtimeLabel: String
  lastSeen: DateTime
  lastError: String
  lastDeliveryFailureAt: DateTime
  retryCount: Int!
  canRetry: Boolean!
  canMove: Boolean!
}

type ApiTokenStatus {
  provider: ApiTokenProvider!
  isSet: Boolean!
  updatedAt: DateTime
}

type SessionRuntimeInstance {
  id: ID!
  label: String!
  hostingMode: HostingMode!
  supportedTools: [CodingTool!]!
  connected: Boolean!
  sessionCount: Int!
  registeredRepoIds: [ID!]!
}

type Notification {
  id: ID!
  type: String!
  message: String!
  timestamp: DateTime!
}

# --- Inputs ---

input CreateChannelInput {
  organizationId: ID!
  name: String!
  type: ChannelType
  projectIds: [ID!]
}

input StartSessionInput {
  tool: CodingTool!
  model: String
  hosting: HostingMode
  runtimeInstanceId: ID
  repoId: ID
  branch: String
  ticketId: ID
  channelId: ID
  projectId: ID
  parentSessionId: ID
  prompt: String
}

input SessionFilters {
  status: SessionStatus
  tool: CodingTool
  repoId: ID
  channelId: ID
}

input CreateTicketInput {
  organizationId: ID!
  title: String!
  description: String
  priority: Priority
  labels: [String!]
  channelId: ID
  projectId: ID
}

input UpdateTicketInput {
  title: String
  description: String
  status: TicketStatus
  priority: Priority
  labels: [String!]
}

input TicketFilters {
  status: TicketStatus
  priority: Priority
  channelId: ID
}

input CreateRepoInput {
  organizationId: ID!
  name: String!
  remoteUrl: String!
  defaultBranch: String
}

input UpdateRepoInput {
  name: String
  defaultBranch: String
}

input CreateProjectInput {
  organizationId: ID!
  name: String!
  repoId: ID
}

input CreateChatInput {
  organizationId: ID!
  memberIds: [ID!]!
  name: String
}

input AddChatMemberInput {
  chatId: ID!
  userId: ID!
}

input ScopeInput {
  type: ScopeType!
  id: ID!
}

input SetApiTokenInput {
  provider: ApiTokenProvider!
  token: String!
}

# --- Queries ---

type Query {
  organization(id: ID!): Organization
  repos(organizationId: ID!): [Repo!]!
  repo(id: ID!): Repo
  projects(organizationId: ID!, repoId: ID): [Project!]!
  project(id: ID!): Project
  channels(organizationId: ID!, projectId: ID): [Channel!]!
  channel(id: ID!): Channel
  sessions(organizationId: ID!, filters: SessionFilters): [Session!]!
  session(id: ID!): Session
  mySessions(organizationId: ID!, status: SessionStatus): [Session!]!
  tickets(organizationId: ID!, filters: TicketFilters): [Ticket!]!
  ticket(id: ID!): Ticket
  events(
    organizationId: ID!
    scope: ScopeInput
    types: [String!]
    after: DateTime
    before: DateTime
    limit: Int
  ): [Event!]!
  availableSessionRuntimes(sessionId: ID!): [SessionRuntimeInstance!]!
  availableRuntimes(tool: CodingTool!): [SessionRuntimeInstance!]!
  repoBranches(repoId: ID!, runtimeInstanceId: ID): [String!]!
  inboxItems(organizationId: ID!, status: InboxItemStatus): [InboxItem!]!
  chats(organizationId: ID!): [Chat!]!
  chat(id: ID!): Chat
  threadReplies(rootEventId: ID!, after: DateTime, limit: Int): [Event!]!
  threadSummary(rootEventId: ID!): ThreadSummary
  participants(scopeType: String!, scopeId: ID!): [Participant!]!
  myApiTokens: [ApiTokenStatus!]!
  sessionTerminals(sessionId: ID!): [Terminal!]!
}

type Terminal {
  id: ID!
  sessionId: ID!
}

# --- Mutations ---

type Mutation {
  createChannel(input: CreateChannelInput!): Channel!
  sendMessage(channelId: ID!, text: String!, parentId: ID): Event!
  startSession(input: StartSessionInput!): Session!
  pauseSession(id: ID!): Session!
  resumeSession(id: ID!): Session!
  runSession(id: ID!, prompt: String, interactionMode: String): Session!
  terminateSession(id: ID!): Session!
  dismissSession(id: ID!): Session!
  deleteSession(id: ID!): Session!
  updateSessionConfig(sessionId: ID!, tool: CodingTool, model: String): Session!
  sendSessionMessage(sessionId: ID!, text: String!, interactionMode: String): Event!
  retrySessionConnection(sessionId: ID!): Session!
  moveSessionToRuntime(sessionId: ID!, runtimeInstanceId: ID!): Session!
  createTicket(input: CreateTicketInput!): Ticket!
  updateTicket(id: ID!, input: UpdateTicketInput!): Ticket!
  commentOnTicket(ticketId: ID!, text: String!): Event!
  linkSessionToTicket(sessionId: ID!, ticketId: ID!): Session!
  linkEntityToProject(entityType: EntityType!, entityId: ID!, projectId: ID!): Project!
  createRepo(input: CreateRepoInput!): Repo!
  updateRepo(id: ID!, input: UpdateRepoInput!): Repo!
  createProject(input: CreateProjectInput!): Project!
  dismissInboxItem(id: ID!): InboxItem!
  setApiToken(input: SetApiTokenInput!): ApiTokenStatus!
  deleteApiToken(provider: ApiTokenProvider!): Boolean!
  createTerminal(sessionId: ID!, cols: Int!, rows: Int!): Terminal!
  destroyTerminal(terminalId: ID!): Boolean!
  registerRepoWebhook(repoId: ID!): Repo!
  unregisterRepoWebhook(repoId: ID!): Repo!
  createChat(input: CreateChatInput!): Chat!
  sendChatMessage(chatId: ID!, text: String, html: String, parentId: ID): Event!
  addChatMember(input: AddChatMemberInput!): Chat!
  leaveChat(chatId: ID!): Chat!
  renameChat(chatId: ID!, name: String!): Chat!
  subscribe(scopeType: String!, scopeId: ID!): Participant!
  unsubscribe(scopeType: String!, scopeId: ID!): Boolean!
  muteScope(scopeType: String!, scopeId: ID!): Participant!
  unmuteScope(scopeType: String!, scopeId: ID!): Participant!
}

# --- Subscriptions ---

type Subscription {
  orgEvents(organizationId: ID!, types: [String!]): Event!
  channelEvents(channelId: ID!, organizationId: ID!, types: [String!]): Event!
  ticketEvents(ticketId: ID!, organizationId: ID!): Event!
  userNotifications(organizationId: ID!): Notification!
  sessionPortsChanged(sessionId: ID!, organizationId: ID!): SessionEndpoints!
  sessionStatusChanged(sessionId: ID!, organizationId: ID!): Session!
  chatEvents(chatId: ID!, organizationId: ID!, types: [String!]): Event!
}
