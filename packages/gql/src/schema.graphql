scalar DateTime
scalar JSON

enum SessionStatus {
  active
  paused
  completed
  failed
  unreachable
}

enum TicketStatus {
  backlog
  todo
  in_progress
  in_review
  done
  cancelled
}

enum Priority {
  urgent
  high
  medium
  low
}

enum HostingMode {
  cloud
  local
}

enum CodingTool {
  claude_code
  cursor
  custom
}

enum ChannelType {
  default
  announcement
  triage
  feed
}

enum ScopeType {
  channel
  session
  ticket
  system
}

enum ActorType {
  user
  agent
  system
}

enum EntityType {
  session
  ticket
  channel
}

enum UserRole {
  admin
  member
  observer
}

enum AgentTrustLevel {
  autonomous
  suggest
  blocked
}

enum EventType {
  message_sent
  message_edited
  message_deleted
  session_started
  session_paused
  session_resumed
  session_terminated
  session_output
  ticket_created
  ticket_updated
  ticket_commented
  entity_linked
  member_joined
  member_left
}

# --- Core Types ---

type Organization {
  id: ID!
  name: String!
  members: [User!]!
  repos: [Repo!]!
  projects: [Project!]!
  channels: [Channel!]!
}

type User {
  id: ID!
  email: String!
  name: String!
  role: UserRole!
}

type Repo {
  id: ID!
  name: String!
  remoteUrl: String!
  defaultBranch: String!
  projects: [Project!]!
  sessions: [Session!]!
}

type Project {
  id: ID!
  name: String!
  repo: Repo
  channels: [Channel!]!
  sessions: [Session!]!
  tickets: [Ticket!]!
}

type Channel {
  id: ID!
  name: String!
  type: ChannelType!
  members: [User!]!
  projects: [Project!]!
  messages(after: DateTime, limit: Int): [Event!]!
}

type Session {
  id: ID!
  name: String!
  status: SessionStatus!
  tool: CodingTool!
  hosting: HostingMode!
  createdBy: User!
  repo: Repo
  branch: String
  channel: Channel
  projects: [Project!]!
  tickets: [Ticket!]!
  endpoints: SessionEndpoints
  connection: SessionConnection
}

type Ticket {
  id: ID!
  title: String!
  description: String!
  status: TicketStatus!
  priority: Priority!
  assignees: [User!]!
  labels: [String!]!
  origin: Event
  channel: Channel
  projects: [Project!]!
  sessions: [Session!]!
}

type Event {
  id: ID!
  scopeType: ScopeType!
  scopeId: ID!
  eventType: EventType!
  payload: JSON!
  actor: Actor!
  parentId: ID
  timestamp: DateTime!
  metadata: JSON
}

# --- Supporting Types ---

type Actor {
  type: ActorType!
  id: ID!
}

type TerminalEndpoint {
  id: String!
  wsUrl: String!
  status: String!
}

type PortEndpoint {
  port: Int!
  url: String!
  label: String!
  status: String!
}

type SessionEndpoints {
  terminals: [TerminalEndpoint!]!
  ports: [PortEndpoint!]!
}

type SessionConnection {
  lastSeen: DateTime
  bridgeVersion: String
}

type Notification {
  id: ID!
  type: String!
  message: String!
  timestamp: DateTime!
}

# --- Inputs ---

input CreateChannelInput {
  organizationId: ID!
  name: String!
  type: ChannelType
  projectIds: [ID!]
}

input StartSessionInput {
  tool: CodingTool!
  hosting: HostingMode!
  repoId: ID
  branch: String
  ticketId: ID
  channelId: ID
  projectId: ID
  prompt: String
}

input SessionFilters {
  status: SessionStatus
  tool: CodingTool
  repoId: ID
}

input CreateTicketInput {
  organizationId: ID!
  title: String!
  description: String
  priority: Priority
  labels: [String!]
  channelId: ID
  projectId: ID
}

input UpdateTicketInput {
  title: String
  description: String
  status: TicketStatus
  priority: Priority
  labels: [String!]
}

input TicketFilters {
  status: TicketStatus
  priority: Priority
  channelId: ID
}

input CreateRepoInput {
  organizationId: ID!
  name: String!
  remoteUrl: String!
  defaultBranch: String
}

input CreateProjectInput {
  organizationId: ID!
  name: String!
  repoId: ID
}

input ScopeInput {
  type: ScopeType!
  id: ID!
}

# --- Queries ---

type Query {
  organization(id: ID!): Organization
  repos(organizationId: ID!): [Repo!]!
  repo(id: ID!): Repo
  projects(organizationId: ID!, repoId: ID): [Project!]!
  project(id: ID!): Project
  channels(organizationId: ID!, projectId: ID): [Channel!]!
  channel(id: ID!): Channel
  sessions(organizationId: ID!, filters: SessionFilters): [Session!]!
  session(id: ID!): Session
  mySessions(organizationId: ID!, status: SessionStatus): [Session!]!
  tickets(organizationId: ID!, filters: TicketFilters): [Ticket!]!
  ticket(id: ID!): Ticket
  events(
    organizationId: ID!
    scope: ScopeInput
    types: [String!]
    after: DateTime
    limit: Int
  ): [Event!]!
}

# --- Mutations ---

type Mutation {
  createChannel(input: CreateChannelInput!): Channel!
  sendMessage(channelId: ID!, text: String!, parentId: ID): Event!
  startSession(input: StartSessionInput!): Session!
  pauseSession(id: ID!): Session!
  resumeSession(id: ID!): Session!
  terminateSession(id: ID!): Session!
  sendSessionMessage(sessionId: ID!, text: String!): Event!
  createTicket(input: CreateTicketInput!): Ticket!
  updateTicket(id: ID!, input: UpdateTicketInput!): Ticket!
  commentOnTicket(ticketId: ID!, text: String!): Event!
  linkSessionToTicket(sessionId: ID!, ticketId: ID!): Session!
  linkEntityToProject(entityType: EntityType!, entityId: ID!, projectId: ID!): Project!
  createRepo(input: CreateRepoInput!): Repo!
  createProject(input: CreateProjectInput!): Project!
}

# --- Subscriptions ---

type Subscription {
  channelEvents(channelId: ID!, organizationId: ID!, types: [String!]): Event!
  sessionEvents(sessionId: ID!, organizationId: ID!): Event!
  ticketEvents(ticketId: ID!, organizationId: ID!): Event!
  userNotifications(organizationId: ID!): Notification!
  sessionPortsChanged(sessionId: ID!, organizationId: ID!): SessionEndpoints!
  sessionStatusChanged(sessionId: ID!, organizationId: ID!): Session!
}
