  sessionSlashCommands(sessionId: ID!): [SlashCommand!]!
  inboxItems(organizationId: ID!, status: InboxItemStatus): [InboxItem!]!
  chats: [Chat!]!
  chat(id: ID!): Chat
  chatMessages(chatId: ID!, after: DateTime, before: DateTime, limit: Int): [Message!]!
  channelMessages(channelId: ID!, after: DateTime, before: DateTime, limit: Int): [Message!]!
  threadReplies(rootMessageId: ID!, after: DateTime, limit: Int): [Message!]!
  threadSummary(rootMessageId: ID!): ThreadSummary
  participants(scopeType: String!, scopeId: ID!): [Participant!]!
  myApiTokens: [ApiTokenStatus!]!
  sessionTerminals(sessionId: ID!): [Terminal!]!
