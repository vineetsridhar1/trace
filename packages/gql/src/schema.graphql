  failedAt: DateTime
  timedOutAt: DateTime
  stoppingAt: DateTime
  stoppedAt: DateTime
  disconnectedAt: DateTime
  reconnectedAt: DateTime
  lastSeen: DateTime
  lastError: String
  lastDeliveryFailureAt: DateTime
  retryCount: Int!
  canRetry: Boolean!
  canMove: Boolean!
