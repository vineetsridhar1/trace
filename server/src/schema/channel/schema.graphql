extend type Query {
  channels: [Channel!]!
  channel(id: ID!): Channel
  validateRepo(localRepoPath: String!): RepoValidation!
  repoBranches(localRepoPath: String!): [String!]!
  suggestScripts(localRepoPath: String!): ScriptSuggestion!
}

extend type Mutation {
  createChannel(name: String!, serverId: String, githubUrl: String, baseBranch: String, defaultRepoPath: String, defaultSetupScript: String, defaultRunScript: String): Channel!
  updateChannel(id: ID!, name: String, baseBranch: String, githubUrl: String, defaultRepoPath: String, defaultSetupScript: String, defaultRunScript: String): Channel!
}

type Channel {
  id: ID!
  serverId: String!
  name: String!
  baseBranch: String
  githubUrl: String
  defaultRepoPath: String
  defaultSetupScript: String
  defaultRunScript: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

type RepoValidation {
  valid: Boolean!
  originUrl: String
  error: String
}

type ScriptSuggestion {
  setupScript: String
  runScript: String
}
