extend type Query {
  channels: [Channel!]!
  channel(id: ID!): Channel
}

extend type Mutation {
  createChannel(name: String!, serverId: String, githubUrl: String, baseBranch: String, defaultSetupScript: String, defaultRunScript: String): Channel!
  updateChannel(id: ID!, name: String, baseBranch: String, githubUrl: String, defaultRepoPath: String, defaultSetupScript: String, defaultRunScript: String): Channel!
}

type Channel {
  id: ID!
  serverId: String!
  name: String!
  baseBranch: String
  githubUrl: String
  defaultRepoPath: String
  defaultSetupScript: String
  defaultRunScript: String
  createdAt: DateTime!
  updatedAt: DateTime!
}
