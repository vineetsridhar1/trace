extend type Query {
  event(id: ID!): Event
}

type Event {
  id: ID!
  sessionId: String!
  hookEventName: String!
  timestamp: DateTime!
  toolName: String
  toolInput: JSON
  toolResponse: JSON
  toolUseId: String
  stopHookActive: Boolean
  lastAssistantMessage: String
  rawPayload: JSON!
  threadId: String!
  importance: String!
}

type TokenUsage {
  inputTokens: Int!
  outputTokens: Int!
  totalTokens: Int!
}

type EventConnection {
  events: [Event!]!
  total: Int!
  limit: Int!
  offset: Int!
  tokenUsage: TokenUsage!
  latestContextTokens: Int!
  cliCostUsd: Float
}

extend type Subscription {
  threadEventCreated(channelId: ID!): ThreadEventPayload!
  threadEventUpdated(channelId: ID!): ThreadEventPayload!
}

type ThreadEventPayload {
  channelId: String!
  messageId: String!
  threadId: String!
  event: Event!
}
