extend type Query {
  event(id: ID!): Event
}

type Event {
  id: ID!
  cliSessionId: String!
  hookEventName: String!
  timestamp: DateTime!
  toolName: String
  toolInput: JSON
  toolResponse: JSON
  toolUseId: String
  stopHookActive: Boolean
  lastAssistantMessage: String
  rawPayload: JSON!
  sessionId: String!
  importance: String!
}

type TokenUsage {
  inputTokens: Int!
  outputTokens: Int!
  totalTokens: Int!
}

type EventConnection {
  events: [Event!]!
  total: Int!
  limit: Int!
  offset: Int!
  tokenUsage: TokenUsage
  latestContextTokens: Int
  cliCostUsd: Float
}

extend type Subscription {
  sessionEventCreated(channelId: ID!): SessionEventPayload!
  sessionEventUpdated(channelId: ID!): SessionEventPayload!
}

type SessionEventPayload {
  channelId: String!
  workspaceId: String!
  sessionId: String!
  event: Event!
}
