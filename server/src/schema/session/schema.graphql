extend type Query {
  sessions(status: String, limit: Int, offset: Int, sort: String, order: String): SessionConnection!
  session(sessionId: String!): Session
  sessionEvents(sessionId: String!, hookEventName: String, toolName: String, after: String, limit: Int, offset: Int): EventConnection!
}

type Session {
  id: ID!
  sessionId: String!
  transcriptPath: String
  cwd: String
  permissionMode: String
  status: String!
  firstSeenAt: DateTime!
  lastSeenAt: DateTime!
  eventCount: Int!
  toolSummary: JSON
}

type SessionConnection {
  sessions: [Session!]!
  total: Int!
  limit: Int!
  offset: Int!
}
