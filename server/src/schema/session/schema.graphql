extend type Query {
  sessions(channelId: ID!, workspaceId: ID!): [Session!]!
  sessionEvents(channelId: ID!, workspaceId: ID!, sessionId: ID!, limit: Int, offset: Int, after: String): EventConnection!
  workspaceEvents(channelId: ID!, workspaceId: ID!, limit: Int, offset: Int, after: String): EventConnection!
}

extend type Mutation {
  createSession(channelId: ID!, workspaceId: ID!): Session!
}

type Session {
  id: ID!
  workspaceId: String!
  createdAt: DateTime!
  eventCount: Int!
}
