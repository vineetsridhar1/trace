extend type Query {
  cliSessions(status: String, limit: Int, offset: Int, sort: String, order: String): CliSessionConnection!
  cliSession(sessionId: String!): CliSession
  cliSessionEvents(sessionId: String!, hookEventName: String, toolName: String, after: String, limit: Int, offset: Int): EventConnection!
}

type CliSession {
  id: ID!
  sessionId: String!
  transcriptPath: String
  cwd: String
  permissionMode: String
  status: String!
  firstSeenAt: DateTime!
  lastSeenAt: DateTime!
  eventCount: Int!
  toolSummary: JSON
}

type CliSessionConnection {
  sessions: [CliSession!]!
  total: Int!
  limit: Int!
  offset: Int!
}
