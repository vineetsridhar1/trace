extend type Query {
  messages(channelId: ID!, limit: Int, offset: Int): MessageConnection!
}

extend type Mutation {
  createMessage(channelId: ID!, text: String!, attachmentIds: [String!]): CreateMessagePayload!
  appendPrompt(channelId: ID!, messageId: ID!, text: String!, attachmentIds: [String!], createNewThread: Boolean, threadId: ID): CreateMessagePayload!
  updateMessagePreview(channelId: ID!, messageId: ID!, preview: String!): Message!
  updateMessageStatus(channelId: ID!, messageId: ID!, status: String!): Message!
  deleteMessage(channelId: ID!, messageId: ID!): Boolean!
}

type Message {
  id: ID!
  channelId: String!
  sessionId: String!
  preview: String
  importance: String!
  status: String!
  summary: String
  branch: String
  claudeSessionId: String
  createdAt: DateTime!
  session: MessageSession
  threadCount: Int!
}

type MessageSession {
  sessionId: String!
  cwd: String
  status: String!
}

type MessageConnection {
  messages: [Message!]!
  total: Int!
  limit: Int!
  offset: Int!
}

type CreateMessagePayload {
  message: Message!
  thread: Thread!
  event: Event!
}

extend type Subscription {
  messageUpserted(channelId: ID!): Message!
  messageDeleted(channelId: ID!): MessageDeletedPayload!
}

type MessageDeletedPayload {
  channelId: String!
  messageId: String!
}
