extend type Query {
  threads(channelId: ID!, messageId: ID!): [Thread!]!
  threadEvents(channelId: ID!, messageId: ID!, threadId: ID!, limit: Int, offset: Int, after: String): EventConnection!
  messageEvents(channelId: ID!, messageId: ID!, limit: Int, offset: Int, after: String): EventConnection!
}

type Thread {
  id: ID!
  messageId: String!
  createdAt: DateTime!
  eventCount: Int!
}
