extend type Query {
  workspace(id: ID!): Workspace
  workspaces(channelId: ID!, limit: Int, offset: Int, excludeStatus: String): WorkspaceConnection!
  checkPRStatuses(channelId: ID!, branches: [String!]!): [PRStatus!]!
  generateBranchName(prompt: String!): String
  channelPresence(channelId: ID!): [WorkspacePresence!]!
}

type PRStatus {
  branch: String!
  hasPR: Boolean!
  merged: Boolean!
  prUrl: String
}

extend type Mutation {
  createWorkspace(channelId: ID!, text: String!, attachmentIds: [String!], ticketId: ID, isProductDoc: Boolean): CreateWorkspacePayload!
  appendPrompt(channelId: ID!, workspaceId: ID!, text: String!, attachmentIds: [String!], createNewSession: Boolean, sessionId: ID): CreateWorkspacePayload!
  updateWorkspacePreview(channelId: ID!, workspaceId: ID!, preview: String!): Workspace!
  updateWorkspaceStatus(channelId: ID!, workspaceId: ID!, status: String!): Workspace!
  deleteWorkspace(channelId: ID!, workspaceId: ID!): Boolean!
  handoffWorkspace(channelId: ID!, workspaceId: ID!): Workspace!
  setWorkspacePrUrl(channelId: ID!, workspaceId: ID!, prUrl: String!): Boolean!
  updateInitialPrompt(channelId: ID!, workspaceId: ID!, text: String!, attachmentIds: [String!]): CreateWorkspacePayload!
  reportPresence(channelId: ID!, workspaceId: ID): Boolean!
}

type Workspace {
  id: ID!
  channelId: String!
  cliSessionId: String!
  userId: String
  preview: String
  importance: String!
  status: String!
  summary: String
  branch: String
  claudeSessionId: String
  createdAt: DateTime!
  cliSession: WorkspaceCliSession
  user: WorkspaceUser
  sessionCount: Int!
  queuedRunConfig: JSON
  isProductDoc: Boolean!
}

type WorkspaceUser {
  id: ID!
  name: String!
  avatarUrl: String
}

type WorkspaceCliSession {
  sessionId: String!
  cwd: String
  status: String!
}

type WorkspaceConnection {
  workspaces: [Workspace!]!
  total: Int!
  mergedCount: Int!
  limit: Int!
  offset: Int!
}

type CreateWorkspacePayload {
  workspace: Workspace!
  session: Session!
  event: Event
}

extend type Subscription {
  workspaceUpserted(channelId: ID!): Workspace!
  workspaceDeleted(channelId: ID!): WorkspaceDeletedPayload!
  presenceUpdated(channelId: ID!): PresencePayload!
}

type WorkspaceDeletedPayload {
  channelId: String!
  workspaceId: String!
}

type PresenceUser {
  userId: ID!
  name: String!
  avatarUrl: String
}

type WorkspacePresence {
  workspaceId: ID!
  viewers: [PresenceUser!]!
}

type PresencePayload {
  channelId: String!
  presence: [WorkspacePresence!]!
}
