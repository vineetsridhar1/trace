extend type Query {
  workspaces(channelId: ID!, limit: Int, offset: Int): WorkspaceConnection!
  checkPRStatuses(channelId: ID!, branches: [String!]!): [PRStatus!]!
  generateBranchName(prompt: String!): String
}

type PRStatus {
  branch: String!
  hasPR: Boolean!
  merged: Boolean!
  prUrl: String
}

extend type Mutation {
  createWorkspace(channelId: ID!, text: String!, attachmentIds: [String!]): CreateWorkspacePayload!
  appendPrompt(channelId: ID!, workspaceId: ID!, text: String!, attachmentIds: [String!], createNewSession: Boolean, sessionId: ID): CreateWorkspacePayload!
  updateWorkspacePreview(channelId: ID!, workspaceId: ID!, preview: String!): Workspace!
  updateWorkspaceStatus(channelId: ID!, workspaceId: ID!, status: String!): Workspace!
  deleteWorkspace(channelId: ID!, workspaceId: ID!): Boolean!
}

type Workspace {
  id: ID!
  channelId: String!
  cliSessionId: String!
  userId: String
  preview: String
  importance: String!
  status: String!
  summary: String
  branch: String
  claudeSessionId: String
  createdAt: DateTime!
  cliSession: WorkspaceCliSession
  user: WorkspaceUser
  sessionCount: Int!
  queuedRunConfig: JSON
}

type WorkspaceUser {
  id: ID!
  name: String!
  avatarUrl: String
}

type WorkspaceCliSession {
  sessionId: String!
  cwd: String
  status: String!
}

type WorkspaceConnection {
  workspaces: [Workspace!]!
  total: Int!
  limit: Int!
  offset: Int!
}

type CreateWorkspacePayload {
  workspace: Workspace!
  session: Session!
  event: Event!
}

extend type Subscription {
  workspaceUpserted(channelId: ID!): Workspace!
  workspaceDeleted(channelId: ID!): WorkspaceDeletedPayload!
}

type WorkspaceDeletedPayload {
  channelId: String!
  workspaceId: String!
}
