extend type Query {
  board(channelId: ID!): [KanbanColumn!]!
}

extend type Mutation {
  createColumn(channelId: ID!, name: String!, slug: String!, color: String): KanbanColumn!
  updateColumn(columnId: ID!, name: String, color: String, sortOrder: Int): KanbanColumn!
  deleteColumn(columnId: ID!): Boolean!
  moveTicket(ticketId: ID!, columnId: ID!, sortOrder: Int): Ticket!
  setTicketDependencies(channelId: ID!, workspaceId: ID!, dependsOnWorkspaceIds: [ID!]!, runConfig: JSON!): Workspace!
  removeTicketDependency(channelId: ID!, workspaceId: ID!, dependsOnWorkspaceId: ID!): Boolean!
  updateQueuedRunConfig(workspaceId: ID!, runConfig: JSON!): Boolean!
  importTicketsToProject(channelId: ID!, tickets: [ImportTicketInput!]!, runConfig: JSON!): [ImportedTicketResult!]!
}

input ImportTicketInput {
  ticketJsonId: String!
  title: String!
  body: String!
  dependencies: [String!]!
}

type ImportedTicketResult {
  ticketJsonId: String!
  workspaceId: ID!
  ticketId: ID!
}

extend type Query {
  ticketByWorkspaceId(workspaceId: ID!): Ticket
  ticketDependencies(workspaceId: ID!): [TicketDependency!]!
}

type KanbanColumn {
  id: ID!
  channelId: String!
  name: String!
  slug: String!
  color: String
  sortOrder: Int!
  tickets: [Ticket!]!
}

type Ticket {
  id: ID!
  workspaceId: String
  columnId: String!
  title: String!
  description: String
  solutionApproach: String
  status: String!
  metadata: JSON
  sortOrder: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  workspace: TicketWorkspace
}

type TicketWorkspace {
  id: ID!
  userId: String
  branch: String
  prUrl: String
  status: String!
  createdAt: DateTime!
  attachments: [TicketAttachment!]!
}

type TicketAttachment {
  id: ID!
  key: String!
  filename: String!
  contentType: String!
  url: String!
}

extend type Subscription {
  ticketUpserted(channelId: ID!): TicketUpsertPayload!
  ticketReadyToRun(channelId: ID!): TicketReadyToRunPayload!
  ticketReadyForReview(channelId: ID!): TicketReadyForReviewPayload!
}

type TicketUpsertPayload {
  channelId: String!
  ticket: Ticket!
  columnSlug: String!
}

type TicketDependency {
  id: ID!
  ticketWorkspaceId: String!
  dependsOnWorkspaceId: String!
  dependsOnTicketTitle: String
  createdAt: DateTime!
}

type TicketReadyToRunPayload {
  channelId: String!
  workspaceId: String!
  runConfig: JSON!
}

type TicketReadyForReviewPayload {
  channelId: String!
  workspaceId: String!
  runConfig: JSON!
}
