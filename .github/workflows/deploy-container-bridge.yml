name: Deploy Container Bridge

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @trace/shared build

      - name: Build container-bridge
        run: pnpm --filter @trace/container-bridge build

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      # Log in to the Fly registry with the Fly API token (username is literal "x").
      - uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      # Publish stable tags the launcher can pin to. `:latest` moves every deploy,
      # so TRACE_RUNTIME_IMAGE=registry.fly.io/trace-sessions:latest auto-rolls;
      # the sha tag is an immutable ref for rollbacks.
      - name: Build and push Fly runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/container-bridge/Dockerfile
          push: true
          tags: |
            registry.fly.io/trace-sessions:latest
            registry.fly.io/trace-sessions:sha-${{ steps.sha.outputs.short }}
