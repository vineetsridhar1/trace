name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  ECR_REPOSITORY: trace
  ECR_REGISTRY: 459063349068.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          build-args: |
            VITE_API_URL=
            VITE_AG_GRID_LICENSE_KEY=${{ secrets.VITE_AG_GRID_LICENSE_KEY }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy production deploy files to EC2
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "mkdir -p ~/trace"
          scp -i ~/.ssh/id_ed25519 deploy/docker-compose.ec2.yml deploy/Caddyfile.template deploy/ec2-deploy.sh \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/trace/"

      - name: Prune unused images before upload
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "docker image prune -af || true"

      - name: Transfer image to EC2
        run: |
          docker save "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" | gzip -1 | \
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "gunzip | docker load"

      - name: Deploy on EC2
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd ~/trace && \
            chmod +x ./ec2-deploy.sh && \
            docker tag '${ECR_REGISTRY}/${ECR_REPOSITORY}:${GITHUB_SHA}' '${ECR_REGISTRY}/${ECR_REPOSITORY}:latest' && \
            IMAGE_TAG='${GITHUB_SHA}' ECR_REGISTRY='${ECR_REGISTRY}' ./ec2-deploy.sh"
