name: Deploy AWS Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-aws-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
  TRACE_DOMAIN_NAME: ${{ vars.TRACE_DOMAIN_NAME }}
  ROUTE53_HOSTED_ZONE_ID: ${{ vars.ROUTE53_HOSTED_ZONE_ID }}
  TRACE_ENVIRONMENT_NAME: prod
  NETWORK_MODE: ${{ vars.NETWORK_MODE }}
  CONTROL_DATABASE_MODE: ${{ vars.CONTROL_DATABASE_MODE }}
  EXISTING_VPC_ID: ${{ vars.EXISTING_VPC_ID }}
  EXISTING_AVAILABILITY_ZONES: ${{ vars.EXISTING_AVAILABILITY_ZONES }}
  EXISTING_PUBLIC_SUBNET_IDS: ${{ vars.EXISTING_PUBLIC_SUBNET_IDS }}
  EXISTING_PUBLIC_ROUTE_TABLE_IDS: ${{ vars.EXISTING_PUBLIC_ROUTE_TABLE_IDS }}
  EXISTING_CONTROL_PLANE_SUBNET_IDS: ${{ vars.EXISTING_CONTROL_PLANE_SUBNET_IDS }}
  EXISTING_CONTROL_PLANE_ROUTE_TABLE_IDS: ${{ vars.EXISTING_CONTROL_PLANE_ROUTE_TABLE_IDS }}
  EXISTING_RUNTIME_SUBNET_IDS: ${{ vars.EXISTING_RUNTIME_SUBNET_IDS }}
  EXISTING_RUNTIME_ROUTE_TABLE_IDS: ${{ vars.EXISTING_RUNTIME_ROUTE_TABLE_IDS }}
  EXISTING_DATA_SUBNET_IDS: ${{ vars.EXISTING_DATA_SUBNET_IDS }}
  EXISTING_DATA_ROUTE_TABLE_IDS: ${{ vars.EXISTING_DATA_ROUTE_TABLE_IDS }}
  EXISTING_CONTROL_DATABASE_HOST: ${{ vars.EXISTING_CONTROL_DATABASE_HOST }}
  EXISTING_CONTROL_DATABASE_PORT: ${{ vars.EXISTING_CONTROL_DATABASE_PORT }}
  EXISTING_CONTROL_DATABASE_NAME: ${{ vars.EXISTING_CONTROL_DATABASE_NAME }}
  EXISTING_CONTROL_DATABASE_IDENTIFIER: ${{ vars.EXISTING_CONTROL_DATABASE_IDENTIFIER }}
  EXISTING_CONTROL_DATABASE_SECRET_ARN: ${{ vars.EXISTING_CONTROL_DATABASE_SECRET_ARN }}
  EXISTING_CONTROL_DATABASE_SECRET_KMS_KEY_ARN: ${{ vars.EXISTING_CONTROL_DATABASE_SECRET_KMS_KEY_ARN }}
  EXISTING_CONTROL_DATABASE_SECURITY_GROUP_ID: ${{ vars.EXISTING_CONTROL_DATABASE_SECURITY_GROUP_ID }}
  EXISTING_GITHUB_OIDC_PROVIDER_ARN: ${{ vars.EXISTING_GITHUB_OIDC_PROVIDER_ARN }}
  ENABLE_APP_DATA: ${{ vars.ENABLE_APP_DATA }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Validate deployment configuration
        run: |
          test -n "$AWS_ACCOUNT_ID" || (echo "Missing AWS_ACCOUNT_ID repository variable" && exit 1)
          test -n "$AWS_REGION" || (echo "Missing AWS_REGION repository variable" && exit 1)
          test -n "$AWS_DEPLOY_ROLE_ARN" || (echo "Missing AWS_DEPLOY_ROLE_ARN repository variable" && exit 1)
          test -n "$TRACE_DOMAIN_NAME" || (echo "Missing TRACE_DOMAIN_NAME repository variable" && exit 1)
          test -n "$ROUTE53_HOSTED_ZONE_ID" || (echo "Missing ROUTE53_HOSTED_ZONE_ID repository variable" && exit 1)
          test -n "$NETWORK_MODE" || (echo "Missing NETWORK_MODE repository variable" && exit 1)
          test -n "$CONTROL_DATABASE_MODE" || (echo "Missing CONTROL_DATABASE_MODE repository variable" && exit 1)

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials through GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render immutable production configuration
        env:
          CONTROL_IMAGE_TAG: sha-${{ github.sha }}
          RUNTIME_IMAGE_TAG: sha-${{ github.sha }}
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL }}
          MONTHLY_BUDGET_USD: ${{ vars.MONTHLY_BUDGET_USD }}
        run: node infra/scripts/render-production-config.mjs

      - name: Validate and synthesize infrastructure
        working-directory: infra
        run: |
          pnpm build
          pnpm exec cdk synth -c config=config/production.json

      - name: Deploy foundation and image registries
        working-directory: infra
        run: >-
          pnpm exec cdk deploy "Trace-${TRACE_ENVIRONMENT_NAME}-Foundation"
          --require-approval never
          -c config=config/production.json

      - name: Read registry outputs
        run: |
          STACK="Trace-${TRACE_ENVIRONMENT_NAME}-Foundation"
          CONTROL_REPOSITORY_URI=$(aws cloudformation describe-stacks --stack-name "$STACK" --query "Stacks[0].Outputs[?OutputKey=='ControlPlaneRepositoryUri'].OutputValue | [0]" --output text)
          RUNTIME_REPOSITORY_URI=$(aws cloudformation describe-stacks --stack-name "$STACK" --query "Stacks[0].Outputs[?OutputKey=='RuntimeRepositoryUri'].OutputValue | [0]" --output text)
          test "$CONTROL_REPOSITORY_URI" != "None"
          test "$RUNTIME_REPOSITORY_URI" != "None"
          echo "CONTROL_REPOSITORY_URI=$CONTROL_REPOSITORY_URI" >> "$GITHUB_ENV"
          echo "RUNTIME_REPOSITORY_URI=$RUNTIME_REPOSITORY_URI" >> "$GITHUB_ENV"

      - name: Authenticate Docker to ECR
        run: |
          REGISTRY_HOST="${CONTROL_REPOSITORY_URI%%/*}"
          aws ecr get-login-password | docker login --username AWS --password-stdin "$REGISTRY_HOST"

      - name: Build application prerequisites
        run: |
          pnpm --filter @trace/shared build
          pnpm --filter @trace/container-bridge build

      - name: Build and push control-plane image
        run: |
          docker build \
            --build-arg VITE_API_URL= \
            --build-arg VITE_AG_GRID_LICENSE_KEY="${{ secrets.VITE_AG_GRID_LICENSE_KEY }}" \
            --tag "$CONTROL_REPOSITORY_URI:sha-${GITHUB_SHA}" \
            .
          docker push "$CONTROL_REPOSITORY_URI:sha-${GITHUB_SHA}"

      - name: Build and push session-runtime image
        run: |
          docker build \
            --file apps/container-bridge/Dockerfile \
            --tag "$RUNTIME_REPOSITORY_URI:sha-${GITHUB_SHA}" \
            .
          docker push "$RUNTIME_REPOSITORY_URI:sha-${GITHUB_SHA}"

      - name: Deploy production stacks
        working-directory: infra
        run: >-
          pnpm exec cdk deploy
          "Trace-${TRACE_ENVIRONMENT_NAME}-Data"
          "Trace-${TRACE_ENVIRONMENT_NAME}-Runtime"
          "Trace-${TRACE_ENVIRONMENT_NAME}-ControlPlane"
          "Trace-${TRACE_ENVIRONMENT_NAME}-AppDeployment"
          "Trace-${TRACE_ENVIRONMENT_NAME}-Observability"
          --require-approval never
          -c config=config/production.json

      - name: Run database migrations
        run: |
          STACK="Trace-${TRACE_ENVIRONMENT_NAME}-ControlPlane"
          CLUSTER=$(aws cloudformation describe-stacks --stack-name "$STACK" --query "Stacks[0].Outputs[?OutputKey=='ClusterName'].OutputValue | [0]" --output text)
          TASK_DEFINITION=$(aws cloudformation describe-stacks --stack-name "$STACK" --query "Stacks[0].Outputs[?OutputKey=='MigrationTaskDefinitionArn'].OutputValue | [0]" --output text)
          SUBNETS=$(aws cloudformation describe-stacks --stack-name "$STACK" --query "Stacks[0].Outputs[?OutputKey=='ControlSubnetIds'].OutputValue | [0]" --output text)
          SECURITY_GROUPS=$(aws cloudformation describe-stacks --stack-name "$STACK" --query "Stacks[0].Outputs[?OutputKey=='MigrationSecurityGroupIds'].OutputValue | [0]" --output text)
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --platform-version LATEST \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SECURITY_GROUPS],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)
          test "$TASK_ARN" != "None"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --query 'tasks[0].containers[0].exitCode' --output text)
          test "$EXIT_CODE" = "0" || (echo "Migration task failed with exit code $EXIT_CODE" && exit 1)

      - name: Refresh services after migration
        run: |
          CLUSTER="trace-${TRACE_ENVIRONMENT_NAME}-control-plane"
          aws ecs update-service --cluster "$CLUSTER" --service "trace-${TRACE_ENVIRONMENT_NAME}-api" --force-new-deployment >/dev/null
          aws ecs update-service --cluster "$CLUSTER" --service "trace-${TRACE_ENVIRONMENT_NAME}-web" --force-new-deployment >/dev/null
          aws ecs wait services-stable --cluster "$CLUSTER" --services "trace-${TRACE_ENVIRONMENT_NAME}-api" "trace-${TRACE_ENVIRONMENT_NAME}-web"
